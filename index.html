<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyril Cherpion | AV Systems Consultant & AI Architect</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎛️</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Manrope', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { darkBg: '#18181b', darkNav: '#27272a', darkCard: '#27272a', darkBorder: '#3f3f46' } 
                } 
            }
        }
        // Prévention du flash blanc
        (function() {
            let theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            if (theme === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
</head>
<body class="transition-colors duration-300 bg-[#f7f7f8] dark:bg-darkBg text-gray-900 dark:text-gray-100 flex flex-col lg:flex-row">

    <nav class="lg:hidden fixed top-0 left-0 right-0 bg-white/95 dark:bg-darkNav/95 backdrop-blur-md border-b border-gray-200 dark:border-darkBorder z-50">
        <div class="p-3 flex flex-col gap-2">
            <div class="flex justify-between items-center px-1">
                <div class="flex gap-4 items-center">
                    <button onclick="toggleTheme()" class="text-gray-700 dark:text-gray-300"><i class="fas fa-circle-half-stroke text-lg"></i></button>
                    <button onclick="toggleLang()" class="font-bold text-[11px] text-gray-500 font-tech">FR/EN</button>
                </div>
                <div class="bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 px-2 py-1.5 rounded-full text-[8px] font-bold uppercase flex items-center gap-1.5 font-tech">
                    <span class="status-dot"></span><span id="status_mobile">...</span>
                </div>
            </div>
            <div class="flex justify-around items-center py-2 border-t border-gray-100 dark:border-darkBorder/30">
                <a href="#home" class="nav-link text-[11px] font-bold text-gray-400 uppercase font-tech" id="nav_home_mobile">info</a>
                <a href="#projects" class="nav-link text-[11px] font-bold text-gray-400 uppercase font-tech" id="nav_work_mobile">work</a>
                <a href="#experience" class="nav-link text-[11px] font-bold text-gray-400 uppercase font-tech" id="nav_exp_mobile">path</a>
            </div>
        </div>
    </nav>

    <aside class="w-full lg:w-80 lg:h-screen lg:fixed left-0 top-0 bg-white dark:bg-darkNav border-r border-gray-200 dark:border-darkBorder p-8 flex flex-col z-40 order-last lg:order-first">
        <div class="flex flex-col items-center text-center">
            <img src="https://github.com/ccherpion.png" alt="Cyril" class="w-32 h-32 rounded-full border border-gray-200 dark:border-darkBorder shadow-sm mb-6 object-cover">
            <h1 id="name" class="text-3xl font-black tracking-tight mb-2 text-gray-900 dark:text-white font-tech uppercase leading-none">...</h1>
            <h2 id="role" class="text-[10px] font-black text-blue-700 dark:text-blue-400 uppercase tracking-widest mb-4 font-tech">...</h2>
            <p id="sidebar_bio" class="text-sm text-gray-600 dark:text-gray-400 leading-relaxed mb-8">...</p>
            
            <div class="w-full space-y-3 mb-8">
                <a href="mailto:ccherpion@outlook.com" class="w-full flex items-center justify-center gap-2 bg-gray-900 dark:bg-white text-white dark:text-gray-900 py-3 rounded-xl font-bold text-sm font-tech">
                    <i class="fas fa-paper-plane text-xs"></i> <span id="btn_contact">...</span>
                </a>
                <a href="CV_Cyril_v7.5.pdf" target="_blank" class="w-full flex items-center justify-center gap-2 bg-gray-50 dark:bg-[#1f1f22] border border-gray-200 dark:border-darkBorder text-gray-700 dark:text-gray-300 py-3 rounded-xl font-bold text-xs font-tech uppercase">
                    <i class="fas fa-file-pdf text-red-500 text-xs"></i> <span id="btn_cv">...</span>
                </a>
            </div>
            
            <div class="w-full space-y-6 text-left">
                <div><h3 id="sidebar_skills_title" class="text-[10px] font-bold text-gray-400 uppercase mb-3 font-tech">...</h3><div id="sidebar-skills" class="flex flex-wrap gap-2"></div></div>
                <div><h3 id="sidebar_hobbies_title" class="text-[10px] font-bold text-gray-400 uppercase mb-3 font-tech">...</h3><div id="sidebar-hobbies" class="flex flex-wrap gap-2"></div></div>
            </div>
        </div>
        <div class="mt-12 pt-10 text-center text-gray-400 text-[10px] font-tech uppercase">CYRIL CHERPION • 2026</div>
    </aside>

    <nav class="hidden lg:flex fixed top-0 left-80 right-0 h-16 bg-white/90 dark:bg-darkNav/90 backdrop-blur-md border-b border-gray-200 dark:border-darkBorder z-50 items-center justify-between px-6">
        <div class="bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 border border-green-200 px-2.5 py-1.5 rounded-full text-[10px] font-bold flex items-center gap-2 font-tech "><span class="status-dot"></span><span id="status">...</span></div>
        <div class="flex gap-8 absolute left-1/2 -translate-x-1/2 font-mono">
            <a href="#home" class="nav-link text-sm font-bold text-gray-500 hover:text-gray-900 dark:hover:text-white transition" id="nav_home">...</a>
            <a href="#projects" class="nav-link text-sm font-bold text-gray-500 hover:text-gray-900 dark:hover:text-white transition" id="nav_work">...</a>
            <a href="#experience" class="nav-link text-sm font-bold text-gray-500 hover:text-gray-900 dark:hover:text-white transition" id="nav_exp">...</a>
        </div>
        <div class="flex items-center gap-4 text-[10px] font-bold text-gray-500 font-tech uppercase">
            <i class="fas fa-location-dot text-blue-600"></i> <span id="loc_nav">...</span>
            <span id="live-time" class="text-blue-700 dark:text-blue-400">--:--:--</span>
            <button onclick="toggleTheme()" class="hover:text-blue-600 transition"><i class="fas fa-circle-half-stroke text-base"></i></button>
            <button onclick="toggleLang()" id="lang-btn" class="hover:text-blue-600 transition text-sm">EN</button>
        </div>
    </nav>

    <main class="w-full lg:ml-80 pt-32 lg:pt-28 p-6 lg:p-12 max-w-[1600px] mx-auto flex flex-col xl:flex-row gap-12 items-start">
        
        <div class="flex-grow w-full xl:max-w-4xl min-h-[70vh]">
            <div id="page-home" class="page-view active space-y-12">
                <h2 id="hero_title" class="scramble-target text-4xl lg:text-7xl font-black tracking-tighter uppercase leading-[0.9]">...</h2>
                <p id="bio" class="scramble-target text-2xl text-gray-600 dark:text-gray-400 leading-relaxed max-w-3xl">...</p>
                <div id="stack-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>

            <div id="page-projects" class="page-view space-y-12">

            <div id="page-experience" class="page-view space-y-12">

                </div>
                <div id="experience-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                <div class="mt-16"><h3 id="edu_title" class="reveal-block text-[11px] font-bold text-gray-400 uppercase mb-8 text-center font-tech">...</h3><div id="education-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div></div>
            </div>
        </div>

        <aside class="w-full xl:w-72 flex-shrink-0 flex flex-col gap-6 xl:sticky xl:top-28">
            <div class="framer-card bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded-3xl p-6">
                <h3 id="widget_title_stats" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-6 font-tech text-center">...</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-1 gap-4">
                    <div class="text-center p-5 rounded-2xl bg-gray-50 dark:bg-[#1f1f22] border border-gray-100 dark:border-darkBorder">
                        <p id="impact_val" class="text-3xl font-black text-blue-700 dark:text-blue-400 font-tech">...</p>
                        <p id="impact_label" class="text-[9px] font-bold text-gray-400 uppercase mt-1 font-tech">...</p>
                    </div>
                    <div class="text-center p-5 rounded-2xl bg-gray-50 dark:bg-[#1f1f22] border border-gray-100 dark:border-darkBorder">
                        <p id="max_budget_val" class="text-3xl font-black text-blue-700 dark:text-blue-400 font-tech">...</p>
                        <p id="max_budget_label" class="text-[9px] font-bold text-gray-400 uppercase mt-1 font-tech">...</p>
                    </div>
                </div>
            </div>
            <div class="framer-card bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded-3xl p-6">
                <h3 id="widget_title_focus" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4 font-tech">...</h3>
                <div class="flex gap-3 items-start">
                    <div class="w-8 h-8 rounded-full badge-blue flex items-center justify-center shrink-0"><i class="fas fa-bolt text-xs"></i></div>
                    <p id="current_focus" class="text-[10px] font-bold leading-tight text-gray-600 dark:text-gray-400 uppercase tracking-tight font-tech">...</p>
                </div>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
