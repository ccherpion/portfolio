    <script>
        (function() {
            let theme = localStorage.getItem('theme');
            if (!theme) {
                const hour = new Date().getHours();

        .nav-link.active { font-weight: 800; border-bottom: 2px solid currentColor; color: #111827; }

    <script>
        let currentLang = localStorage.getItem('lang') || 'en';
        let content = {};
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) { html.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            else { html.classList.add('dark'); localStorage.setItem('theme', 'dark'); }
        }
        function startLiveClock() {
            const timeEl = document.getElementById('live-time');
            const timeElMob = document.getElementById('live-time-mobile');
            setInterval(() => {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('fr-FR', { timeZone: 'Europe/Paris', hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' CET';
                if(timeEl) timeEl.innerText = timeStr;
                if(timeElMob) timeElMob.innerText = timeStr;
            }, 1000);
        }
        function handleRouting() {
            const hash = window.location.hash || '#home';
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const targetPage = document.getElementById('page-' + hash.replace('#', ''));
            if(targetPage) targetPage.classList.add('active');
            const activeLink = document.querySelector(`a[href="${hash}"]`);
            if(activeLink) activeLink.classList.add('active');
            window.scrollTo(0, 0);
        }
        window.addEventListener('hashchange', handleRouting);
        async function init() {
            try {
                startLiveClock();
                const res = await fetch(`data/${currentLang}.json?v=${new Date().getTime()}`);
                content = await res.json();
                render();
                handleRouting();
                document.body.classList.remove('opacity-0');
            } catch (e) { console.error("Error loading content:", e); }
        }
        function render() {
            const d = content;
            const ids = ['nav_home', 'nav_work', 'nav_exp', 'status', 'status_mobile', 'name', 'role', 'sidebar_bio', 'sidebar_skills_title', 'sidebar_hobbies_title', 'sidebar_lang_title', 'btn_contact', 'btn_cv', 'hero_sub', 'bio', 'impact_label', 'impact_val', 'max_budget_label', 'max_budget_val', 'loc_nav', 'loc_mobile', 'work_title', 'stack_title', 'exp_title', 'edu_title', 'widget_title_stats', 'widget_title_focus', 'current_focus'];
            ids.forEach(id => {
                let jsonKey = id;
                if (id === 'loc_nav' || id === 'loc_mobile') jsonKey = 'loc_val';
                if (id === 'status_mobile') jsonKey = 'status';
                const el = document.getElementById(id);
                if(el && d[jsonKey]) { el.innerText = d[jsonKey]; }
            });
            document.getElementById('lang-btn').innerText = d.lang_btn;
            if(d.sidebar_skills) document.getElementById('sidebar-skills').innerHTML = d.sidebar_skills.map(skill => `<span class="bg-gray-50 dark:bg-[#1f1f22] text-gray-700 dark:text-gray-300 text-[10px] font-bold px-3 py-1.5 rounded-full uppercase tracking-wider border border-gray-100 dark:border-darkBorder font-tech">${skill}</span>`).join('');
            if(d.sidebar_hobbies) document.getElementById('sidebar-hobbies').innerHTML = d.sidebar_hobbies.map(hobby => `<span class="bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300 text-[10px] font-bold px-3 py-1.5 rounded-full uppercase tracking-wider border border-blue-100 dark:border-blue-900/50 font-tech">${hobby}</span>`).join('');
            if(d.sidebar_lang) document.getElementById('sidebar-lang').innerHTML = d.sidebar_lang.map(lang => `<span class="bg-gray-50 dark:bg-[#1f1f22] text-gray-700 dark:text-gray-300 text-[10px] font-bold px-3 py-1.5 rounded-full border border-gray-100 dark:border-darkBorder font-tech">${lang}</span>`).join('');
            if (d.stack) {
                document.getElementById('stack-container').innerHTML = d.stack.map(s => `
                    <div class="space-y-3">
                        <div class="flex items-center gap-2 border-b border-gray-100 dark:border-darkBorder pb-2">
                            <i class="${s.icon} text-blue-600 dark:text-blue-400 text-sm"></i>
                            <p class="text-[10px] font-bold text-gray-900 dark:text-white font-tech uppercase">${s.category}</p>
                        </div>
                        <ul class="text-[11px] text-gray-700 dark:text-gray-400 space-y-2 font-medium">
                            ${s.items.map(item => `<li>${item}</li>`).join('')}
                        </ul>
                    </div>
                `).join('');
            }
            if (d.projects) {
                document.getElementById('projects-container').innerHTML = d.projects.map(p => `
                    <div class="framer-card bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded-3xl flex flex-col justify-between overflow-hidden group">
                        <div class="h-48 w-full overflow-hidden relative border-b border-gray-100 dark:border-darkBorder">
                            <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                        </div>
                        <div class="p-8 flex flex-col flex-grow justify-between">
                            <div>
                                <h3 class="text-2xl font-bold tracking-tight mb-3 text-gray-900 dark:text-white font-tech uppercase leading-none">${p.name}</h3>
                                <p class="text-gray-700 dark:text-gray-400 text-sm font-medium leading-relaxed">${p.desc}</p>
                            </div>
                            <div class="flex justify-between items-end mt-8">
                                <span class="bg-blue-100 dark:bg-blue-900/30 text-blue-800 dark:text-blue-300 text-[10px] font-bold px-3 py-1.5 rounded-full uppercase tracking-widest shadow-sm font-tech">${p.tag}</span>
                                <span class="text-2xl font-black text-gray-900 dark:text-white font-tech">${p.val}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            if (d.experiences) {
                document.getElementById('experience-container').innerHTML = d.experiences.map((exp, i) => `
                    <div class="flex flex-col md:flex-row gap-4 md:gap-6 pb-8 ${i !== d.experiences.length - 1 ? 'border-b border-gray-200 dark:border-darkBorder' : ''}">
                        <div class="md:w-1/4 pt-1"><p class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase font-tech">${exp.date}</p></div>
                        <div class="md:w-3/4 flex gap-5">
                            <div class="w-12 h-12 rounded-xl bg-blue-50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800/50 flex items-center justify-center text-blue-600 dark:text-blue-400 shrink-0 mt-1 shadow-sm"><i class="${exp.icon} text-xl"></i></div>
                            <div>
                                <h4 class="text-xl font-bold text-gray-900 dark:text-white font-tech uppercase tracking-tight leading-none">${exp.role}</h4>
                                <p class="text-blue-700 dark:text-blue-400 text-xs font-bold mb-3 font-tech uppercase tracking-widest opacity-80">${exp.company}</p>
                                <p class="text-gray-700 dark:text-gray-400 text-sm font-medium leading-relaxed">${exp.desc}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            if (d.education) {
                document.getElementById('education-container').innerHTML = d.education.map((edu, i) => `
                    <div class="flex flex-col md:flex-row gap-4 md:gap-6 pb-8 ${i !== d.education.length - 1 ? 'border-b border-gray-200 dark:border-darkBorder' : ''}">
                        <div class="md:w-1/4 pt-1"><p class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase font-tech">${edu.date}</p></div>
                        <div class="md:w-3/4 flex gap-5">
                            <div class="w-12 h-12 rounded-xl bg-gray-50 dark:bg-[#1f1f22] border border-gray-200 dark:border-darkBorder flex items-center justify-center text-gray-600 dark:text-gray-400 shrink-0 mt-1 shadow-sm"><i class="${edu.icon} text-xl"></i></div>
                            <div>
                                <h4 class="text-xl font-bold text-gray-900 dark:text-white font-tech uppercase tracking-tight leading-none">${edu.degree}</h4>
                                <p class="text-blue-700 dark:text-blue-400 text-xs font-bold mb-3 font-tech uppercase tracking-widest opacity-80">${edu.school}</p>
                                <p class="text-gray-700 dark:text-gray-400 text-sm font-medium leading-relaxed">${edu.desc}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }
        async function toggleLang() {
            document.body.classList.add('opacity-0');
            currentLang = currentLang === 'fr' ? 'en' : 'fr';
            localStorage.setItem('lang', currentLang);
            setTimeout(() => { init(); }, 300);
        }
        init();
    </script>
</body>
</html>
