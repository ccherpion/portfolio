<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyril Cherpion | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .dark { --bg: #0d0d0f; --card: #151517; --border: #1f1f23; }
        body { font-family: 'Manrope', sans-serif; transition: all 0.3s ease; }
        .font-tech { font-family: 'JetBrains Mono', monospace; }
        .bento-card { opacity: 0; transform: translateY(30px); transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-active { opacity: 1 !important; transform: translateY(0) !important; }
        .word { display: inline-block; white-space: nowrap; margin-right: 0.35em; }
        .char { display: inline-block; opacity: 0; transform: translateY(4px); transition: all 0.3s ease; }
        .char.visible { opacity: 1; transform: translateY(0); }
        .badge-blue { background-color: #eff6ff; color: #1d4ed8; border: 1px solid #dbeafe; padding: 4px 12px; border-radius: 99px; font-weight: 700; font-size: 10px; text-transform: uppercase; }
        .dark .badge-blue { background-color: rgba(30, 58, 138, 0.4); color: #93c5fd; border: 1px solid rgba(255, 255, 255, 0.1); }
        .page-view { display: none; }
        .page-view.active { display: block; }
        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; animation: glow 2s infinite; }
        @keyframes glow { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.6; } }
    </style>
</head>
<body class="bg-[#f7f7f8] dark:bg-[#0d0d0f] text-gray-900 dark:text-gray-100 flex flex-col lg:flex-row min-h-screen">
    <nav class="lg:hidden fixed top-0 left-0 right-0 bg-white/95 dark:bg-[#151517]/95 backdrop-blur-md border-b border-gray-200 z-50 p-3">
        <div class="flex justify-between items-center px-1">
            <button onclick="toggleTheme()"><i class="fas fa-circle-half-stroke"></i></button>
            <div class="flex items-center gap-2 bg-green-50 dark:bg-green-900/20 px-2 py-1 rounded-full border border-green-100"><span class="status-dot"></span><span id="status_mobile" class="text-[8px] font-bold uppercase font-tech">...</span></div>
        </div>
        <div class="flex justify-around py-2 border-t mt-2"><a href="#home" class="nav-link text-[10px] font-bold uppercase">info</a><a href="#projects" class="nav-link text-[10px] font-bold uppercase">work</a><a href="#experience" class="nav-link text-[10px] font-bold uppercase">path</a></div>
    </nav>
    <aside class="w-full lg:w-80 lg:h-screen lg:fixed left-0 top-0 bg-white dark:bg-[#151517] border-r border-gray-200 p-8 flex flex-col z-40 order-last lg:order-first">
        <div class="flex flex-col items-center text-center">
            <a href="#home" class="relative z-50 block mb-6 transition-transform hover:scale-110"><img src="https://github.com/ccherpion.png" class="w-24 h-24 rounded-full border shadow-md object-cover"></a>
            <h1 id="name" class="text-2xl font-black mb-1 uppercase tracking-tighter">...</h1>
            <h2 id="role" class="text-[9px] font-bold text-blue-600 dark:text-blue-400 uppercase tracking-widest mb-4 font-tech">...</h2>
            <p id="sidebar_bio" class="text-sm text-gray-500 dark:text-gray-400 mb-8 leading-relaxed">...</p>
            <div class="w-full space-y-3 mb-8">
                <a href="mailto:ccherpion@outlook.com" class="w-full flex items-center justify-center gap-2 bg-gray-900 dark:bg-white text-white dark:text-gray-900 py-3 rounded-xl font-bold text-[11px] font-tech shadow-md"><i class="fas fa-paper-plane"></i> <span id="btn_contact">...</span></a>
                <a href="CV_Cyril_v7.5.pdf" target="_blank" class="w-full flex items-center justify-center gap-2 bg-gray-50 dark:bg-[#1f1f22] border border-gray-200 text-gray-700 dark:text-gray-300 py-3 rounded-xl font-bold text-[10px] uppercase shadow-sm"><i class="fas fa-file-pdf text-red-500"></i> <span id="btn_cv">...</span></a>
            </div>
            <div id="sidebar-skills" class="flex flex-wrap gap-2 mb-6"></div>
        </div>
    </aside>
    <nav class="hidden lg:flex fixed top-0 left-80 right-0 h-16 bg-white/90 dark:bg-[#151517]/90 backdrop-blur-md border-b z-50 items-center justify-between px-8">
        <div class="flex items-center gap-3 bg-green-50 dark:bg-green-900/20 px-3 py-1.5 rounded-full border border-green-100 font-tech uppercase font-bold text-[10px]"><span class="status-dot"></span><span id="status">...</span></div>
        <div class="flex gap-10 font-tech font-bold uppercase text-[11px]"><a href="#home" class="nav-link">cyril.info</a><a href="#projects" class="nav-link">work.done</a><a href="#experience" class="nav-link">my.path</a></div>
        <div class="flex items-center gap-5 font-tech uppercase text-[10px]">
            <div class="flex items-center gap-1.5"><i class="fas fa-location-dot text-blue-600"></i> <span id="loc_nav">...</span></div>
            <button onclick="toggleTheme()"><i class="fas fa-circle-half-stroke text-base"></i></button>
            <button onclick="toggleLang()" id="lang-btn" class="font-bold">EN</button>
        </div>
    </nav>
    <main class="w-full lg:ml-80 pt-32 lg:pt-28 p-6 lg:p-12 flex-grow">
        <div id="page-home" class="page-view active">
            <h2 id="hero_title" class="text-4xl lg:text-7xl font-black uppercase mb-8">...</h2>
            <p id="bio" class="text-2xl text-gray-600 dark:text-gray-400 leading-relaxed font-medium mb-12">...</p>
            <div id="stack-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>
        <div id="page-projects" class="page-view">
            <h2 id="work_title" class="text-4xl lg:text-7xl font-black uppercase mb-8">...</h2>
            <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>
        <div id="page-experience" class="page-view">
            <h2 id="path_title" class="text-4xl lg:text-7xl font-black uppercase mb-8">...</h2>
            <div id="experience-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </main>
    <script>
        let currentLang = localStorage.getItem('lang') || 'fr';
        let content = {};
        const scChars = "ABCDEFGHJKLMNOPQRSTUVWXYZ0123456789";

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');

        async function init() {
            const res = await fetch(`data/${currentLang}.json?v=${Date.now()}`);
            content = await res.json();
            render();
            handleRouting();
        }

        function runScramble(id, speed = 25) {
            const el = document.getElementById(id); if (!el) return;
            const text = el.getAttribute('data-text') || el.innerText;
            el.innerHTML = ''; let charIdx = 0;
            text.split(' ').forEach(w => {
                const wSpan = document.createElement('span'); wSpan.className = 'word';
                [...w].forEach(c => {
                    const s = document.createElement('span'); s.className = 'char'; s.innerText = c;
                    wSpan.appendChild(s);
                    setTimeout(() => {
                        let cnt = 0; const itv = setInterval(() => {
                            s.innerText = scChars[Math.floor(Math.random() * scChars.length)]; s.classList.add('visible');
                            if (cnt >= 5) { s.innerText = c; clearInterval(itv); } cnt++;
                        }, 30);
                    }, charIdx * speed);
                    charIdx++;
                });
                el.appendChild(wSpan); charIdx++;
            });
        }

        function triggerBento() {
            const view = document.querySelector('.page-view.active');
            if(!view) return;
            view.querySelectorAll('.bento-card').forEach((c, i) => {
                c.classList.remove('reveal-active');
                void c.offsetWidth;
                c.style.transitionDelay = `${350 + (i * 80)}ms`;
                c.classList.add('reveal-active');
            });
        }

        function render() {
            const d = content;
            const ids = ['name','role','sidebar_bio','hero_title','work_title','path_title','bio','btn_contact','btn_cv','loc_nav','lang-btn','status','status_mobile'];
            ids.forEach(id => {
                const el = document.getElementById(id);
                let key = id.replace('_mobile', '').replace('-btn', '_btn').replace('loc_nav', 'loc_val');
                if(el && d[key]) { el.innerText = d[key]; el.setAttribute('data-text', d[key]); }
            });
            if(d.stack) document.getElementById('stack-grid').innerHTML = d.stack.map(s => `<div class="bento-card bg-white dark:bg-[#151517] p-6 rounded-2xl border border-gray-100 dark:border-zinc-800"><div class="flex items-center gap-3 mb-6 border-b pb-4"><div class="badge-blue"><i class="${s.icon}"></i></div><h4 class="text-sm font-bold uppercase">${s.category}</h4></div><div class="grid grid-cols-2 gap-4">${s.items.map(item => `<div class="flex items-center gap-2"><img src="${item.logo}" class="w-5 h-5 dark:invert opacity-70"><span class="text-[11px] font-bold uppercase text-gray-500">${item.name}</span></div>`).join('')}</div></div>`).join('');
            if(d.projects) document.getElementById('projects-container').innerHTML = d.projects.map(p => `<div class="bento-card group relative overflow-hidden aspect-[4/3] rounded-3xl"><img src="${p.img}" class="w-full h-full object-cover transition-all grayscale group-hover:grayscale-0 group-hover:scale-105"><div class="absolute inset-0 bg-black/60 flex flex-col justify-end p-8 text-white"><h3 class="text-3xl font-black uppercase mb-2">${p.name}</h3><div class="flex justify-between items-center"><span class="badge-blue !bg-white/20 !text-white !border-transparent">${p.tag}</span><span class="text-xl font-bold font-tech">${p.val}</span></div></div></div>`).join('');
            if(d.experiences) document.getElementById('experience-grid').innerHTML = d.experiences.map(e => `<div class="bento-card bg-white dark:bg-[#151517] p-6 rounded-2xl border border-gray-100 dark:border-zinc-800 flex flex-col justify-between min-h-[250px]"><div><div class="flex justify-between mb-5"><div class="badge-blue"><i class="${e.icon}"></i></div><span class="text-[9px] font-bold text-gray-400 uppercase">${e.date}</span></div><h4 class="text-lg font-bold uppercase mb-1">${e.role}</h4><p class="text-blue-600 text-[10px] font-black uppercase">${e.company}</p></div><p class="text-gray-500 text-[13px] mt-4">${e.desc}</p></div>`).join('');
        }

        function handleRouting() {
            const hash = window.location.hash || '#home';
            const pageMap = { '#home': 'page-home', '#projects': 'page-projects', '#experience': 'page-experience' };
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(pageMap[hash]);
            if(target) { target.classList.add('active'); runScramble(hash === '#home' ? 'hero_title' : (hash === '#projects' ? 'work_title' : 'path_title'), 20); triggerBento(); }
        }

        async function toggleLang() { currentLang = currentLang === 'fr' ? 'en' : 'fr'; localStorage.setItem('lang', currentLang); init(); }
        window.addEventListener('hashchange', handleRouting);
        init();
    </script>
</body>
</html>
