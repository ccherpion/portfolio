<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyril Cherpion | AV Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f7f7f8] dark:bg-[#18181b] text-gray-900 dark:text-gray-100 flex flex-col lg:flex-row min-h-screen">
    <nav class="lg:hidden fixed top-0 left-0 right-0 bg-white/95 dark:bg-[#27272a]/95 border-b z-50 p-3 flex justify-between">
        <button onclick="toggleTheme()"><i class="fas fa-circle-half-stroke"></i></button>
        <div class="flex gap-4 uppercase font-tech text-[10px] font-bold">
            <a href="#home">info</a><a href="#projects">work</a><a href="#experience">path</a>
        </div>
    </nav>
    <aside class="w-full lg:w-80 lg:h-screen lg:fixed left-0 top-0 bg-white dark:bg-[#27272a] border-r p-8 flex flex-col z-40 order-last lg:order-first">
        <div class="flex flex-col items-center text-center">
            <a href="#home" class="relative z-50 block mb-6 hover:scale-105 transition-transform cursor-pointer">
                <img src="https://github.com/ccherpion.png" class="w-24 h-24 rounded-full border shadow-md object-cover">
            </a>
            <h1 id="name" class="text-2xl font-black mb-1 uppercase tracking-tighter">...</h1>
            <h2 id="role" class="text-[9px] font-bold text-blue-600 uppercase tracking-widest mb-4 font-tech">...</h2>
            <p id="sidebar_bio" class="text-sm text-gray-500 mb-8 leading-relaxed">...</p>
            <div class="w-full space-y-3 mb-8">
                <a href="mailto:ccherpion@outlook.com" class="w-full flex items-center justify-center gap-2 bg-gray-900 dark:bg-white text-white dark:text-gray-900 py-3 rounded-xl font-bold text-[11px] font-tech shadow-md"><i class="fas fa-paper-plane"></i> <span id="btn_contact">...</span></a>
                <a href="CV_Cyril_v7.5.pdf" target="_blank" class="w-full flex items-center justify-center gap-2 bg-gray-50 dark:bg-[#1f1f22] border border-gray-200 text-gray-700 py-3 rounded-xl font-bold text-[10px] uppercase shadow-sm"><i class="fas fa-file-pdf text-red-500"></i> <span id="btn_cv">...</span></a>
            </div>
            <div class="w-full space-y-6 text-left">
                <div><h3 id="sidebar_skills_title" class="text-[9px] font-bold text-gray-400 mb-3 font-tech uppercase">...</h3><div id="sidebar-skills" class="flex flex-wrap gap-2"></div></div>
                <div><h3 id="sidebar_hobbies_title" class="text-[9px] font-bold text-gray-400 mb-3 font-tech uppercase">...</h3><div id="sidebar-hobbies" class="flex flex-wrap gap-2"></div></div>
            </div>
        </div>
    </aside>
    <nav class="hidden lg:flex fixed top-0 left-80 right-0 h-16 bg-white/90 dark:bg-[#27272a]/90 backdrop-blur-md border-b z-50 items-center justify-between px-8">
        <div class="flex items-center gap-3 bg-green-50 dark:bg-green-900/20 px-3 py-1.5 rounded-full border border-green-100 font-tech uppercase font-bold text-[10px]">
            <span class="status-dot"></span><span id="status">...</span>
        </div>
        <div class="flex gap-10 absolute left-1/2 -translate-x-1/2 font-tech font-bold uppercase text-[11px]">
            <a href="#home" class="nav-link text-gray-400">cyril.info</a><a href="#projects" class="nav-link text-gray-400">work.done</a><a href="#experience" class="nav-link text-gray-400">my.path</a>
        </div>
        <div class="flex items-center gap-5 text-[10px] font-bold text-gray-500 font-tech uppercase">
            <div class="flex items-center gap-1.5"><i class="fas fa-location-dot text-blue-600"></i> <span id="loc_nav">...</span></div>
            <span id="live-time" class="text-blue-700 dark:text-blue-400 font-mono">--:--:--</span>
            <button onclick="toggleTheme()"><i class="fas fa-circle-half-stroke text-base"></i></button>
            <button onclick="toggleLang()" id="lang-btn" class="text-sm">EN</button>
        </div>
    </nav>
    <main class="w-full lg:ml-80 pt-32 lg:pt-28 p-6 lg:p-12 flex flex-col xl:flex-row items-start justify-between gap-12 flex-grow">
        <div class="flex-grow w-full xl:max-w-4xl min-h-[70vh]">
            <div id="page-home" class="page-view active space-y-12">
                <div class="mb-12"><h2 id="hero_title" class="text-4xl lg:text-7xl font-black uppercase tracking-tighter mb-8">...</h2><p id="bio" class="text-2xl text-gray-600 dark:text-gray-400 leading-relaxed font-medium">...</p></div>
                <div id="stack-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
            <div id="page-projects" class="page-view space-y-12">
                <div class="mb-12"><h2 id="work_title" class="text-4xl lg:text-7xl font-black uppercase tracking-tighter mb-8">...</h2><p id="work_sub" class="text-2xl text-gray-600 dark:text-gray-400 font-medium">...</p></div>
                <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
            </div>
            <div id="page-experience" class="page-view space-y-12">
                <div class="mb-12"><h2 id="path_title" class="text-4xl lg:text-7xl font-black uppercase tracking-tighter mb-8">...</h2><p id="path_sub" class="text-2xl text-gray-600 dark:text-gray-400 font-medium">...</p></div>
                <div id="experience-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
        </div>
        <aside id="sidebar-right" class="w-full xl:w-72 flex-shrink-0 flex flex-col gap-6 xl:sticky xl:top-28 xl:ml-auto">
            <div class="bg-white dark:bg-[#27272a] border p-6 rounded-3xl">
                <h3 id="widget_title_stats" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-6 text-center">...</h3>
                <div class="space-y-4">
                    <div class="text-center p-5 rounded-2xl bg-gray-50 dark:bg-[#1f1f22]"><p id="impact_val" class="text-3xl font-black text-blue-700 font-tech">...</p><p id="impact_label" class="text-[9px] font-bold text-gray-400 uppercase mt-1">...</p></div>
                    <div class="text-center p-5 rounded-2xl bg-gray-50 dark:bg-[#1f1f22]"><p id="max_budget_val" class="text-3xl font-black text-blue-700 font-tech">...</p><p id="max_budget_label" class="text-[9px] font-bold text-gray-400 uppercase mt-1">...</p></div>
                </div>
            </div>
            <div class="bg-white dark:bg-[#27272a] border p-6 rounded-3xl"><h3 id="widget_title_focus" class="text-[10px] font-bold text-gray-400 uppercase mb-4">...</h3><div class="flex gap-3 items-start"><div class="badge-blue"><i class="fas fa-bolt"></i></div><p id="current_focus" class="text-[10px] font-bold text-gray-600 dark:text-gray-400 uppercase"></p></div></div>
        </aside>
    </main>
    <script src="script.js"></script>
</body>
</html>
