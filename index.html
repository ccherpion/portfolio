<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyril Cherpion | Portfolio AV Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #05070a;
            --text: #ffffff;
            --accent-corp: #38bdf8;
            --accent-home: #f59e0b;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            scroll-behavior: smooth;
        }

        /* Conteneur de section */
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid rgba(255,255,255,0.05);
        }

        /* En-tête de produit */
        .product-header {
            padding: 20px 40px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-info h2 { margin: 0; font-size: 1.5rem; }
        .product-info p { margin: 5px 0 0; opacity: 0.6; font-size: 0.9rem; }

        .btn-buy {
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }

        /* Style spécifique Boardroom */
        #boardroom .btn-buy { background: var(--accent-corp); }
        #boardroom h2 { color: var(--accent-corp); }

        /* Style spécifique Smart Home */
        #smart-home .btn-buy { background: var(--accent-home); }
        #smart-home h2 { color: var(--accent-home); }

        /* L'iframe qui prend tout le reste de l'espace */
        .iframe-container {
            flex-grow: 1;
            width: 100%;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Navigation flottante */
        .nav-dots {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            text-decoration: none;
        }
        .dot:hover { background: white; }
    </style>
</head>
<body>

    <div class="nav-dots">
        <a href="#boardroom" class="dot" title="Boardroom UI"></a>
        <a href="#smart-home" class="dot" title="Smart Home UI"></a>
    </div>

    <section id="boardroom">
        <div class="product-header">
            <div class="product-info">
                <h2>01. BOARDROOM PREMIUM UI</h2>
                <p>Système collaboratif • Contrôle Matrice • Gestion PTZ</p>
            </div>
            <a href="https://gumroad.com" target="_blank" class="btn-buy">Acheter (49€)</a>
        </div>
        <div class="iframe-container">
            <iframe src="https://ui-dashboard-ai.vercel.app/products/boardroom/index.htmlindex.html"></iframe>
        </div>
    </section>

    <section id="smart-home">
        <div class="product-header">
            <div class="product-info">
                <h2>02. SMART HOME LUXURY</h2>
                <p>Résidentiel Haut de Gamme • Éclairage • Médias</p>
            </div>
            <a href="https://gumroad.com" target="_blank" class="btn-buy">Acheter (49€)</a>
        </div>
        <div class="iframe-container">
            <iframe src="https://ui-dashboard-ai.vercel.app/products/smart-home/index.htmlindex.html"></iframe>
        </div>
    </section>

</body>
</html>
