    <script>
        let currentLang = localStorage.getItem('lang') || 'fr';
        let content = {};
        const scChars = "ABCDEFGHJKLMNOPQRSTUVWXYZ0123456789#%*+";

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        async function init() {
            try {
                const res = await fetch(`data/${currentLang}.json?v=${Date.now()}`);
                content = await res.json();
                if (content.seo) {
                    document.title = content.seo.title;
                }
                render();
                handleRouting();
            } catch (e) { console.error("Init Error:", e); }
        }

        function runScramble(id, speed = 25) {
            const el = document.getElementById(id); if (!el) return;
            const text = el.getAttribute('data-text') || el.innerText;
            if (!text || text === "...") return;
            el.innerHTML = ''; el.style.opacity = '1';
            let charIdx = 0;
            text.split(' ').forEach(w => {
                const wSpan = document.createElement('span'); wSpan.className = 'word';
                [...w].forEach(c => {
                    const s = document.createElement('span'); s.className = 'char'; s.innerText = c;
                    wSpan.appendChild(s);
                    const currentIdx = charIdx;
                    setTimeout(() => {
                        let cnt = 0; const itv = setInterval(() => {
                            s.innerText = scChars[Math.floor(Math.random() * scChars.length)]; s.classList.add('visible');
                            if (cnt >= 5) { s.innerText = c; clearInterval(itv); } cnt++;
                        }, 30);
                    }, currentIdx * speed);
                    charIdx++;
                });
                el.appendChild(wSpan); charIdx++;
            });
        }

        function triggerBento() {
            const view = document.querySelector('.page-view.active');
            if(!view) return;
            view.querySelectorAll('.reveal-block, .bento-card').forEach((c, i) => {
                c.classList.remove('active');
                void c.offsetWidth;
                c.style.transitionDelay = `${100 + (i * 100)}ms`;
                c.classList.add('active');
            });
        }

        function render() {
            const d = content;
            const ids = ['status','status_mobile','name','role','sidebar_bio','sidebar_skills_title','sidebar_hobbies_title','btn_contact','btn_cv','hero_title','work_title','path_title','bio','work_sub','path_sub','impact_val','impact_label','max_budget_val','max_budget_label','widget_title_stats','widget_title_focus','current_focus','loc_nav','exp_title','edu_title'];
            
            ids.forEach(id => {
                let key = id.replace('_mobile', ''); if (id === 'loc_nav') key = 'loc_val';
                const el = document.getElementById(id);
                if(el && d[key]) { el.innerText = d[key]; el.setAttribute('data-text', d[key]); }
            });

            if(d.sidebar_skills) document.getElementById('sidebar-skills').innerHTML = d.sidebar_skills.map(s => `<span class="bg-gray-50 dark:bg-darkBorder text-[9px] font-black px-3 py-1.5 rounded-xl border border-gray-100 dark:border-darkBorder font-tech uppercase tracking-widest text-gray-500 dark:text-gray-400">${s}</span>`).join('');
            if(d.sidebar_hobbies) document.getElementById('sidebar-hobbies').innerHTML = d.sidebar_hobbies.map(h => `<span class="badge-blue">${h}</span>`).join('');
            
            if (d.stack) {
                document.getElementById('stack-grid').innerHTML = d.stack.map(s => `
                    <div class="bento-card framer-card reveal-block">
                        <div class="flex items-center gap-4 mb-8 pb-5 border-b border-gray-100 dark:border-darkBorder">
                            <div class="w-12 h-12 rounded-2xl badge-blue flex items-center justify-center shadow-sm"><i class="${s.icon} text-xl"></i></div>
                            <h4 class="text-sm font-black uppercase tracking-[0.2em] font-tech text-gray-900 dark:text-white">${s.category}</h4>
                        </div>
                        <div class="grid grid-cols-2 gap-5">
                            ${s.items.map(item => `<div class="flex items-center gap-3 group/stack"><div class="w-8 h-8 rounded-lg bg-gray-50 dark:bg-darkBorder flex items-center justify-center p-1.5 group-hover/stack:scale-110 transition-transform"><img src="${item.logo}" class="w-full h-full object-contain grayscale dark:invert"></div><span class="text-[10px] font-black font-tech uppercase text-gray-400 group-hover/stack:text-blue-600 transition-colors">${item.name}</span></div>`).join('')}
                        </div>
                    </div>
                `).join('');
            }

            if (d.projects) {
                document.getElementById('projects-container').innerHTML = d.projects.map(p => `
                    <div class="bento-card group p-0 overflow-hidden aspect-[1.4/1] reveal-block">
                        <img src="${p.img}" class="w-full h-full object-cover transition-all duration-1000 grayscale group-hover:grayscale-0 group-hover:scale-105">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex flex-col justify-end p-10 text-white">
                            <h3 class="text-4xl font-black uppercase mb-3 tracking-tighter transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500">${p.name}</h3>
                            <p class="text-[11px] font-medium opacity-0 group-hover:opacity-100 transform translate-y-4 group-hover:translate-y-0 transition-all duration-500 delay-100 mb-6 text-gray-300">${p.desc}</p>
                            <div class="flex justify-between items-center transform translate-y-4 group-hover:translate-y-0 transition-all duration-500 delay-200">
                                <span class="badge-blue !bg-white/10 !text-white !border-white/10 backdrop-blur-md">${p.tag}</span>
                                <span class="text-2xl font-black font-tech">${p.val}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            if (d.experiences) {
                document.getElementById('experience-grid').innerHTML = d.experiences.map(exp => `
                    <div class="bento-card framer-card reveal-block flex flex-col justify-between min-h-[250px]">
                        <div>
                            <div class="flex justify-between items-start mb-6">
                                <div class="w-14 h-14 rounded-2xl badge-blue flex items-center justify-center shadow-sm"><i class="${exp.icon} text-2xl"></i></div>
                                <span class="text-[10px] font-black text-gray-400 font-tech uppercase tracking-widest">${exp.date}</span>
                            </div>
                            <h4 class="text-xl font-black uppercase leading-tight mb-2 tracking-tighter text-gray-900 dark:text-white">${exp.role}</h4>
                            <p class="text-blue-600 dark:text-blue-400 text-[10px] font-black uppercase tracking-[0.2em] mb-6 opacity-80">${exp.company || ''}</p>
                        </div>
                        <p class="text-gray-500 dark:text-gray-400 text-[13px] font-medium leading-relaxed">${exp.desc}</p>
                    </div>
                `).join('');
            }

            if (d.education) {
                document.getElementById('education-grid').innerHTML = d.education.map(edu => `
                    <div class="bento-card framer-card reveal-block flex flex-col justify-between min-h-[180px]">
                        <div>
                            <div class="flex justify-between items-start mb-5">
                                <div class="w-12 h-12 rounded-2xl badge-blue flex items-center justify-center shadow-sm"><i class="${edu.icon} text-xl"></i></div>
                                <span class="text-[10px] font-black text-gray-400 font-tech uppercase tracking-widest">${edu.date}</span>
                            </div>
                            <h4 class="text-base font-black uppercase mb-1 text-gray-900 dark:text-white leading-tight">${edu.degree}</h4>
                            <p class="text-gray-400 dark:text-gray-500 text-[10px] font-black uppercase tracking-widest font-tech">${edu.school}</p>
                        </div>
                    </div>
                `).join('');
            }
        }

        function handleRouting() {
            const hash = window.location.hash || '#home';
            const pageMap = { '#home': 'page-home', '#projects': 'page-projects', '#experience': 'page-experience' };
            const titleMap = { '#home': 'hero_title', '#projects': 'work_title', '#experience': 'path_title' };
            const subMap = { '#home': 'bio', '#projects': 'work_sub', '#experience': 'path_sub' };

            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            const target = document.getElementById(pageMap[hash]);
            if(target) {
                target.classList.add('active');
                if(titleMap[hash]) runScramble(titleMap[hash], 20);
                if(subMap[hash]) setTimeout(() => runScramble(subMap[hash], 5), 100);
                triggerBento();
            }
            document.querySelectorAll(`a[href="${hash}"]`).forEach(l => l.classList.add('active'));
            window.scrollTo(0, 0);
        }

        async function toggleLang() { 
            currentLang = currentLang === 'fr' ? 'en' : 'fr'; 
            localStorage.setItem('lang', currentLang); 
            await init(); 
        }

        window.addEventListener('hashchange', handleRouting);
        init();
    </script>
