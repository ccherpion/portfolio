<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyril Cherpion | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f7f7f8] dark:bg-[#18181b] text-gray-900 dark:text-gray-100 flex flex-col lg:flex-row min-h-screen">
    <nav class="lg:hidden fixed top-0 left-0 right-0 bg-white/95 dark:bg-[#27272a]/95 border-b z-50 p-3 flex justify-between">
        <button onclick="toggleTheme()"><i class="fas fa-circle-half-stroke"></i></button>
        <div class="flex gap-4 uppercase font-tech text-[10px] font-bold">
            <a href="#home">info</a><a href="#projects">work</a><a href="#experience">path</a>
        </div>
    </nav>
    <aside class="w-full lg:w-80 lg:h-screen lg:fixed left-0 top-0 bg-white dark:bg-[#27272a] border-r p-8 flex flex-col z-40">
        <div class="flex flex-col items-center text-center">
            <a href="#home" class="relative z-50 block mb-6 hover:scale-105 transition-transform">
                <img src="https://github.com/ccherpion.png" class="w-24 h-24 rounded-full border shadow-md object-cover">
            </a>
            <h1 id="name" class="text-2xl font-black mb-1 uppercase tracking-tighter">...</h1>
            <h2 id="role" class="text-[9px] font-bold text-blue-600 uppercase tracking-widest mb-4 font-tech">...</h2>
            <p id="sidebar_bio" class="text-sm text-gray-500 mb-8 leading-relaxed">...</p>
            <div id="sidebar-skills" class="flex flex-wrap gap-2 justify-center"></div>
        </div>
        <div class="mt-auto text-center text-gray-400 text-[9px] font-tech uppercase">CYRIL CHERPION • 2026</div>
    </aside>
    <main class="w-full lg:ml-80 pt-32 lg:pt-28 p-6 lg:p-12 flex-grow">
        <div id="page-home" class="page-view active">
            <h2 id="hero_title" class="text-4xl lg:text-7xl font-black uppercase tracking-tighter mb-8">...</h2>
            <div id="stack-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>
        <div id="page-projects" class="page-view">
            <h2 id="work_title" class="text-4xl lg:text-7xl font-black uppercase tracking-tighter mb-8">...</h2>
            <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>
        <div id="page-experience" class="page-view">
            <h2 id="path_title" class="text-4xl lg:text-7xl font-black uppercase tracking-tighter mb-8">...</h2>
            <div id="experience-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
