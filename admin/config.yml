backend:
  name: github
  repo: ccherpion/portfolio
  branch: main
  base_url: https://sveltia-cms-auth.ccherpion.workers.dev

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  # 1. CONFIGURATION COMMUNE (Lien Booking, Réseaux, CV, Photo)
  - name: "config_globale"
    label: "⚙️ Configuration Globale"
    delete: false
    files:
      - file: "data/common.json"
        label: "Liens & Assets Communs"
        name: "common"
        fields:
          - label: "Coordonnées & Liens"
            name: "links"
            widget: "object"
            fields:
              - {label: "Lien de Réservation (Générique)", name: "booking_url", widget: "string"}
              - {label: "URL LinkedIn", name: "linkedin", widget: "string"}
              - {label: "URL GitHub", name: "github", widget: "string"}
              - {label: "Email (mailto:)", name: "email", widget: "string"}
              - {label: "Fichier CV (PDF)", name: "cv_pdf", widget: "file"}
              - {label: "Photo de Profil", name: "profile_img", widget: "image"}

  # 2. CONTENUS TRADUITS (FR & EN séparés)
  - name: "traductions"
    label: "🌍 Contenus et Traductions"
    files:
      # --- FICHIER FRANÇAIS ---
      - file: "data/fr.json"
        label: "Drapeau Français 🇫🇷"
        name: "fr"
        fields:
          - {label: "SEO", name: "seo", widget: "object", fields: [{label: "Titre Google", name: "title", widget: "string"}, {label: "Description Google", name: "description", widget: "text"}]}
          - {label: "Nom affiché", name: "name", widget: "string"}
          - {label: "Rôle / Titre", name: "role", widget: "string"}
          - {label: "Statut (On Air)", name: "status", widget: "string"}
          - {label: "Biographie Sidebar", name: "sidebar_bio", widget: "text"}
          - {label: "Titre Accueil", name: "hero_title", widget: "string"}
          - {label: "Introduction (Bio)", name: "bio", widget: "text"}
          - label: "Expériences (MY.PATH)"
            name: "experiences"
            widget: "list"
            fields:
              - {label: "Période", name: "date", widget: "string"}
              - {label: "Poste", name: "role", widget: "string"}
              - {label: "Entreprise", name: "company", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Icône FontAwesome", name: "icon", widget: "string"}
          - label: "Éducation"
            name: "education"
            widget: "list"
            fields:
              - {label: "Période", name: "date", widget: "string"}
              - {label: "Diplôme", name: "degree", widget: "string"}
              - {label: "École", name: "school", widget: "string"}
          - label: "Projets (WORK.DONE)"
            name: "projects"
            widget: "list"
            fields:
              - {label: "Nom", name: "name", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Image", name: "img", widget: "image"}
          - label: "Dashboards (UI.DASH)"
            name: "dashboards_list"
            widget: "list"
            fields:
              - {label: "Titre", name: "title", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Lien Iframe", name: "iframe_url", widget: "string"}
              - {label: "Texte Bouton", name: "btn_text", widget: "string"}

      # --- FICHIER ANGLAIS ---
      - file: "data/en.json"
        label: "English Flag 🇬🇧"
        name: "en"
        fields:
          - {label: "SEO", name: "seo", widget: "object", fields: [{label: "Google Title", name: "title", widget: "string"}, {label: "Google Description", name: "description", widget: "text"}]}
          - {label: "Display Name", name: "name", widget: "string"}
          - {label: "Role / Title", name: "role", widget: "string"}
          - {label: "Status", name: "status", widget: "string"}
          - {label: "Sidebar Bio", name: "sidebar_bio", widget: "text"}
          - {label: "Hero Title", name: "hero_title", widget: "string"}
          - {label: "Introduction (Bio)", name: "bio", widget: "text"}
          - label: "Experiences (MY.PATH)"
            name: "experiences"
            widget: "list"
            fields:
              - {label: "Date", name: "date", widget: "string"}
              - {label: "Role", name: "role", widget: "string"}
              - {label: "Company", name: "company", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Icon", name: "icon", widget: "string"}
          - label: "Dashboards (UI.DASH)"
            name: "dashboards_list"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Iframe URL", name: "iframe_url", widget: "string"}
              - {label: "Button Text", name: "btn_text", widget: "string"}