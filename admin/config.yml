backend:
  name: github
  repo: ccherpion/portfolio
  branch: main
  base_url: https://sveltia-cms-auth.ccherpion.workers.dev

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "traductions"
    label: "Contenus et Traductions"
    files:
      - file: "data/fr.json"
        label: "Français"
        name: "fr"
        fields:
          - {label: "SEO", name: "seo", widget: "object", fields: [{label: "Titre Google", name: "title", widget: "string"}, {label: "Description Google", name: "description", widget: "text"}]}
          - {label: "Nom", name: "name", widget: "string"}
          - {label: "Rôle", name: "role", widget: "string"}
          - {label: "Statut", name: "status", widget: "string"}
          - {label: "Biographie Sidebar", name: "sidebar_bio", widget: "text"}
          - {label: "Titre Accueil", name: "hero_title", widget: "string"}
          - {label: "Introduction", name: "bio", widget: "text"}
          - label: "Expériences Détaillées (MY.PATH)"
            name: "experiences"
            widget: "list"
            fields:
              - {label: "Période", name: "date", widget: "string"}
              - {label: "Poste", name: "role", widget: "string"}
              - {label: "Entreprise", name: "company", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Icône FontAwesome", name: "icon", widget: "string"}
          - label: "Éducation & Formations"
            name: "education"
            widget: "list"
            fields:
              - {label: "Période", name: "date", widget: "string"}
              - {label: "Diplôme", name: "degree", widget: "string"}
              - {label: "École", name: "school", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Icône FontAwesome", name: "icon", widget: "string"}
          - label: "Projets (WORK.DONE)"
            name: "projects"
            widget: "list"
            fields:
              - {label: "Nom du Projet", name: "name", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Valeur / Budget", name: "val", widget: "string"}
              - {label: "Tag", name: "tag", widget: "string"}
              - {label: "Image URL", name: "img", widget: "string"}
          - label: "Dashboards Dynamiques (UI.DASH)"
            name: "dashboards_list"
            widget: "list"
            fields:
              - {label: "Titre", name: "title", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "URL Iframe", name: "iframe_url", widget: "string"}
              - {label: "Lien du Bouton", name: "link", widget: "string"}
              - {label: "Texte du Bouton", name: "btn_text", widget: "string"}
          - label: "Expertises (Grille Accueil)"
            name: "expertise"
            widget: "list"
            required: false
            fields:
              - {label: "Nom", name: "name", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Icône", name: "icon", widget: "string"}
          - label: "Technologies (Stack)"
            name: "stack"
            widget: "list"
            required: false
            fields:
              - {label: "Catégorie", name: "category", widget: "string"}
              - label: "Outils"
                name: "items"
                widget: "list"
                fields:
                  - {label: "Nom", name: "name", widget: "string"}
                  - {label: "Logo URL", name: "logo", widget: "string"}

      - file: "data/en.json"
        label: "English"
        name: "en"
        fields:
          - {label: "SEO", name: "seo", widget: "object", fields: [{label: "Google Title", name: "title", widget: "string"}, {label: "Google Description", name: "description", widget: "text"}]}
          - {label: "Name", name: "name", widget: "string"}
          - {label: "Role", name: "role", widget: "string"}
          - {label: "Status", name: "status", widget: "string"}
          - {label: "Sidebar Bio", name: "sidebar_bio", widget: "text"}
          - {label: "Hero Title", name: "hero_title", widget: "string"}
          - {label: "Introduction", name: "bio", widget: "text"}
          - label: "Detailed Experiences (MY.PATH)"
            name: "experiences"
            widget: "list"
            fields:
              - {label: "Date", name: "date", widget: "string"}
              - {label: "Role", name: "role", widget: "string"}
              - {label: "Company", name: "company", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "FontAwesome Icon", name: "icon", widget: "string"}
          - label: "Education & Certifications"
            name: "education"
            widget: "list"
            fields:
              - {label: "Date", name: "date", widget: "string"}
              - {label: "Degree", name: "degree", widget: "string"}
              - {label: "School", name: "school", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "FontAwesome Icon", name: "icon", widget: "string"}
          - label: "Projects (WORK.DONE)"
            name: "projects"
            widget: "list"
            fields:
              - {label: "Project Name", name: "name", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Value", name: "val", widget: "string"}
              - {label: "Tag", name: "tag", widget: "string"}
              - {label: "Image URL", name: "img", widget: "string"}
          - label: "Dynamic Dashboards (UI.DASH)"
            name: "dashboards_list"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Iframe URL", name: "iframe_url", widget: "string"}
              - {label: "Button Link", name: "link", widget: "string"}
              - {label: "Button Text", name: "btn_text", widget: "string"}
          - label: "Expertise (Home Grid)"
            name: "expertise"
            widget: "list"
            required: false
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Icon", name: "icon", widget: "string"}
          - label: "Technologies (Stack)"
            name: "stack"
            widget: "list"
            required: false
            fields:
              - {label: "Category", name: "category", widget: "string"}
              - label: "Tools"
                name: "items"
                widget: "list"
                fields:
                  - {label: "Name", name: "name", widget: "string"}
                  - {label: "Logo URL", name: "logo", widget: "string"}
