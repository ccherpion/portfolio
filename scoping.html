<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Scoping | Cyril Cherpion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontInter: ['Manrope', 'sans-serif'], colors: { darkBg: '#1E1E1E', darkNav: '#272727', darkBorder: '#3f3f3f' } } }
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>(function() { const theme = localStorage.getItem('theme') || 'dark'; document.documentElement.classList.add(theme); })();</script>
</head>
<body class="bg-[#f7f7f8] dark:bg-darkBg text-gray-900 dark:text-gray-100 font-sans min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-2xl bg-white dark:bg-darkNav border border-gray-200 dark:border-darkBorder rounded-3xl p-8 shadow-2xl">
        <div class="mb-8 flex justify-between items-center">
            <a href="/" class="text-blue-600 dark:text-blue-400 font-bold uppercase text-xs tracking-widest"><i class="fas fa-arrow-left mr-2"></i> Retour</a>
            <h1 class="text-2xl font-black uppercase tracking-tighter italic">Project.Scoping</h1>
        </div>

        <form name="scoping-onboarding" method="POST" data-netlify="true" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-2">Nom & Prénom</label>
                    <input type="text" name="name" required class="w-full bg-gray-50 dark:bg-darkBg border border-gray-200 dark:border-darkBorder rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-2">Entreprise / Organisation</label>
                    <input type="text" name="company" class="w-full bg-gray-50 dark:bg-darkBg border border-gray-200 dark:border-darkBorder rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase text-gray-400 mb-2">Type de Mission</label>
                <select name="project_type" class="w-full bg-gray-50 dark:bg-darkBg border border-gray-200 dark:border-darkBorder rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <option value="av_design">Design & Architecture AV</option>
                    <option value="acoustic">Étude Acoustique & Sonorisation</option>
                    <option value="ai_integration">Intégration IA & Automatisation</option>
                    <option value="pre_sales">Support Avant-Vente B2B</option>
                    <option value="other">Autre Projet Spécifique</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase text-gray-400 mb-2">Budget Estimé</label>
                <select name="budget" class="w-full bg-gray-50 dark:bg-darkBg border border-gray-200 dark:border-darkBorder rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-blue-600 font-bold">
                    <option value="undetermined">À définir</option>
                    <option value="10k-50k">10k€ - 50k€</option>
                    <option value="50k-150k">50k€ - 150k€</option>
                    <option value="150k_plus">Plus de 150k€</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase text-gray-400 mb-2">Description du besoin & Enjeux</label>
                <textarea name="description" rows="4" required placeholder="Décrivez votre projet..." class="w-full bg-gray-50 dark:bg-darkBg border border-gray-200 dark:border-darkBorder rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black uppercase tracking-widest transition-all shadow-lg shadow-blue-500/20 active:scale-[0.98]">
                Lancer le diagnostic
            </button>
        </form>
    </div>
</body>
</html>
